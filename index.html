<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title> Mobon Downloader</title>

<style>
:root{
  --gold:#f5c26b;
  --gold-dark:#d9a441;
  --blue:#0b4db8;
  --blue-dark:#083b8f;
  --bg:linear-gradient(135deg,#071a3a,#0b4db8);
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:tahoma,system-ui;
  background:var(--bg);
  color:#fff;
}
.wrap{
  max-width:420px;
  margin:60px auto;
  padding:18px;
}
.card{
  background:linear-gradient(180deg,#0f2f6b,#0b4db8);
  border-radius:22px;
  box-shadow:0 20px 40px rgba(0,0,0,.4);
  padding:22px;
}
.brand{
  text-align:center;
  font-weight:800;
  letter-spacing:.5px;
  color:var(--gold);
}
.brand span{
  display:block;
  color:#c7d7ff;
  font-weight:500
}
.slider{
  margin:16px 0;
  overflow:hidden;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.15)
}
.slides{
  display:flex;
  width:300%;
  animation:slide 12s infinite
}
.slide{
  width:100%;
  padding:22px;
  text-align:center;
  background:linear-gradient(135deg,#0b4db8,#071a3a)
}
.slide h3{
  margin:0 0 6px;
  color:var(--gold)
}
@keyframes slide{
  0%{transform:translateX(0)}
  33%{transform:translateX(-33.333%)}
  66%{transform:translateX(-66.666%)}
  100%{transform:translateX(0)}
}
.input{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:none;
  outline:none;
  margin-top:10px
}
.btn{
  width:100%;
  margin-top:12px;
  padding:14px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,var(--gold),var(--gold-dark));
  color:#2a1a00;
  font-weight:800;
  cursor:pointer
}
.status{
  margin-top:12px;
  text-align:center;
  min-height:22px;
}
.footer{
  margin-top:14px;
  text-align:center;
  font-size:12px;
  color:#c7d7ff
}
</style>
</head>

<body>
<div class="wrap">
  <div class="card">
    <div class="brand">Sabori Downloader<span>Instagram Video & Reel</span></div>

    <div class="slider">
      <div class="slides">
        <div class="slide"><h3>سریع</h3><p>دانلود با یک کلیک</p></div>
        <div class="slide"><h3>کیفیت بالا</h3><p>HD / Original</p></div>
        <div class="slide"><h3>امن</h3><p>بدون ذخیره لینک‌ها</p></div>
      </div>
    </div>

    <input id="ig" class="input" placeholder="لینک ویدیوی اینستاگرام را پیست کن">
    <button class="btn" onclick="go()">دانلود ویدیو</button>
    <div id="st" class="status"></div>
  </div>

  <div class="footer">                           </div>
</div>

<script>
async function go() {
  const input = document.getElementById("ig");
  const st = document.getElementById("st");
  const url = input.value.trim();

  if (!url) {
    st.innerText = "❌ لینک را وارد کن";
    return;
  }

  st.innerText = "⏳ در حال پردازش...";

  const api =
    "https://hidden-dew-cadd.omarsabori37.workers.dev/?url=" +
    encodeURIComponent(url);

  try {
    const res = await fetch(api);
    const data = await res.json();

    if (!data.success) {
      st.innerText = "❌ دانلود ممکن نشد";
      return;
    }

    st.innerText = "✅ دانلود شروع شد";

    // دانلود مستقیم در همین صفحه
    const a = document.createElement("a");
    a.href = data.download;
    a.download = "";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

  } catch (e) {
    st.innerText = "❌ خطا در اتصال";
  }
  }
</script>
</body>
</html>
